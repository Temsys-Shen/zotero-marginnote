<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Zotero Connector - Library</title>
    <link rel="stylesheet" href="common.css">
    <script src="i18n.js"></script>
</head>

<body>

    <header>
        <div class="view-switcher">
            <span class="view-option active" data-view="library" role="button">Library</span>
            <span class="view-option" data-view="selected" role="button">Selected Cards</span>
            <span class="view-option" data-view="settings" role="button">Settings</span>
        </div>
    </header>

    <div id="library-view">
        <div class="search-bar">
            <input id="q" placeholder="Keywords (Title, Author, Year)..." onkeydown="event.key=='Enter'&&run()">
            <button id="btn" onclick="run()">Search</button>
        </div>
        <div class="filter-row">
            <select id="filter-collection">
                <option value="">All</option>
            </select>
            <select id="filter-tag" multiple size="4">
            </select>
        </div>
        <div id="content-area">
            <div id="log">Ready to search.</div>
            <div id="out"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // 初始化 HTML 静态文本
        (function() {
            // View switcher
            var viewOptions = document.querySelectorAll('.view-option');
            viewOptions.forEach(function(opt, idx) {
                var values = [T('library'), T('selected_cards'), T('settings')];
                if (idx < values.length) opt.textContent = values[idx];
            });

            // Search bar
            var qInput = document.getElementById('q');
            if (qInput) qInput.placeholder = T('search_placeholder');

            var searchBtn = document.getElementById('btn');
            if (searchBtn) searchBtn.textContent = T('search_button');

            // Log
            var logDiv = document.getElementById('log');
            if (logDiv) logDiv.textContent = T('ready_to_search');
        })();

        // View switcher logic
        (function initSwitcher() {
            var viewOptions = document.querySelectorAll('.view-option[data-view]');
            viewOptions.forEach(function(el) {
                el.addEventListener('click', function() {
                    var view = this.getAttribute('data-view');

                    // Update active state
                    viewOptions.forEach(function(opt) {
                        opt.classList.remove('active');
                    });
                    this.classList.add('active');

                    // Switch views
                    if (view === 'library') {
                        // Already on library page
                    } else if (view === 'selected') {
                        window.location.href = 'selection.html';
                    } else if (view === 'settings') {
                        window.location.href = 'settings.html';
                    }
                });
            });
        })();
    </script>
    <script>
        function resetFilterOptions() {
            var colSelect = $('filter-collection');
            var tagSelect = $('filter-tag');
            if (colSelect) { colSelect.innerHTML = '<option value="">' + T('all') + '</option>'; }
            if (tagSelect) { tagSelect.innerHTML = ''; }
        }

        async function loadFilters() {
            // 从注入的配置或 DOM 中读取配置
            var cfg = window.__mnConfig || {};
            var mode = $('mode') ? $('mode').value : (cfg.mode || 'L');
            if (!API[mode]) mode = 'L';
            var uid = ($('uid') && $('uid').value) || cfg.uid || '';
            var key = ($('key') && $('key').value) || cfg.key || '';
            if (mode === 'L') uid = '0';
            if (mode === 'C' && !uid) return;
            var headers = { 'Zotero-API-Version': 3 };
            if (mode === 'C' && key) headers['Zotero-API-Key'] = key;
            var base = API[mode] + '/' + uid;
            var doFetch = mode === 'L' ? localFetch : function (url, opts) { return fetch(url, opts); };
            var colSelect = $('filter-collection');
            var tagSelect = $('filter-tag');
            if (!colSelect || !tagSelect) return;
            colSelect.innerHTML = '<option value="">' + T('all') + '</option>';
            tagSelect.innerHTML = '';
            try {
                var colRes = await doFetch(base + '/collections', { headers: headers });
                if (colRes.ok) {
                    var colls = await colRes.json();
                    if (Array.isArray(colls)) {
                        for (var c = 0; c < colls.length; c++) {
                            var ckey = colls[c].key;
                            var cname = (colls[c].data && colls[c].data.name) ? colls[c].data.name : (ckey || '');
                            var opt = document.createElement('option');
                            opt.value = ckey || '';
                            opt.textContent = cname;
                            colSelect.appendChild(opt);
                        }
                    }
                }
            } catch (e) { }
            try {
                var tagRes = await doFetch(base + '/tags', { headers: headers });
                if (tagRes.ok) {
                    var tags = await tagRes.json();
                    if (Array.isArray(tags)) {
                        for (var t = 0; t < tags.length; t++) {
                            var tagName = tags[t].tag != null ? String(tags[t].tag) : '';
                            if (!tagName) continue;
                            var topt = document.createElement('option');
                            topt.value = encodeURIComponent(tagName);
                            topt.textContent = tagName;
                            tagSelect.appendChild(topt);
                        }
                    }
                }
            } catch (e) { }
        }

        // Panel show hook for library
        window.__onPanelShow = function() {
            loadFilters();
        };
        
        // Config injection fallback for library page
        (function initConfigDrivenFilters() {
            var existingOnMNConfig = window.onMNConfig;
            window.onMNConfig = function() {
                try { loadFilters(); } catch (e) {}
                if (typeof existingOnMNConfig === 'function') existingOnMNConfig();
            };
        })();

        // Initial config load for filters (if common.js loaded early)
        var colSelect = $('filter-collection');
        var tagSelect = $('filter-tag');
        if (colSelect) colSelect.addEventListener('change', function () { this.blur(); });
        if (tagSelect) {
            tagSelect.addEventListener('change', function () {
                var sel = this;
                var selected = Array.from(sel.selectedOptions || []);
                if (selected.length === 0) return;
                for (var i = selected.length - 1; i >= 0; i--) sel.insertBefore(selected[i], sel.firstChild);
                sel.classList.add('reorder-done', 'reorder-flash');
                setTimeout(function () {
                    sel.classList.remove('reorder-flash');
                }, 200);
            });
        }

        // 从 Zotero 数据中获取字段值
        function getZoteroFieldValue(data, field) {
            if (!data || !field) return undefined;

            switch(field) {
                case 'title':
                    return data.title || '';
                case 'author':
                    return data.creators && data.creators[0] && (data.creators[0].lastName || data.creators[0].name) || '';
                case 'year':
                    var date = data.date || '';
                    return date.substring(0, 4) || '';
                case 'type':
                    return data.itemType || '';
                case 'tags':
                    return Array.isArray(data.tags) ? data.tags.map(t => t.tag) : [];
                case 'abstractNote':
                    return data.abstractNote || '';
                case 'DOI':
                    return data.DOI || '';
                case 'ISBN':
                    return data.ISBN || '';
                case 'ISSN':
                    return data.ISSN || '';
                case 'url':
                    return data.url || '';
                case 'language':
                    return data.language || '';
                case 'publicationTitle':
                    return data.publicationTitle || '';
                case 'volume':
                    return data.volume || '';
                case 'issue':
                    return data.issue || '';
                case 'pages':
                    return data.pages || '';
                case 'thesisType':
                    return data.thesisType || '';
                case 'university':
                    return data.university || '';
                case 'extra':
                    return data.extra || '';
                case 'creators':
                    return Array.isArray(data.creators) ? data.creators.map(c => c.name || c.lastName || '') : [];
                default:
                    return undefined;
            }
        }

        // HTML转义函数
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // 渲染单个字段
        function renderField(value, template, isArray) {
            // 空值检查，不显示空字段
            if (value === undefined || value === null || value === '') return '';

            // 处理多值字段
            if (isArray && Array.isArray(value)) {
                if (value.length === 0) return '';
                var rendered = value.map(v => {
                    var escaped = escapeHtml(v);
                    var fieldHtml = template.replace('{{value}}', escaped);
                    return fieldHtml ? '<span>' + fieldHtml + '</span>' : '';
                }).join(' ');
                return rendered ? '<div class="custom-field">' + rendered + '</div>' : '';
            }

            // 处理单值字段
            var escaped = escapeHtml(value);
            var fieldHtml = template.replace('{{value}}', escaped);
            return fieldHtml ? '<div class="custom-field">' + fieldHtml + '</div>' : '';
        }

        function buildCreateNoteUrl(title, type, year, author, linkZotero, linkPdf, linkWeb, linkCloudPdf, itemKey, mode, uid, apiKey, data, templates) {
            var q = [
                'title=' + encodeURIComponent(title),
                'type=' + encodeURIComponent(type || ''),
                'year=' + encodeURIComponent(year || ''),
                'author=' + encodeURIComponent(author || ''),
                'lZ=' + encodeURIComponent(linkZotero || ''),
                'itemKey=' + encodeURIComponent(itemKey || ''),
                'mode=' + encodeURIComponent(mode || ''),
                'uid=' + encodeURIComponent(uid || ''),
                'key=' + encodeURIComponent(apiKey || '')
            ];

            // 如果有模板配置，渲染字段HTML
            if (templates && data) {
                var customFieldsHtml = '';

                // 添加固定字段模板
                if (templates.fixed) {
                    for (var field in templates.fixed) {
                        var template = templates.fixed[field];
                        var value = getZoteroFieldValue(data, field);
                        if (value !== undefined && value !== '') {
                            var isArray = field === 'tags' || field === 'creators';
                            var rendered = renderField(value, template, isArray);
                            if (rendered) customFieldsHtml += rendered;
                        }
                    }
                }

                // 添加自定义字段模板
                if (templates.custom && templates.custom.length > 0) {
                    templates.custom.forEach(function(cf) {
                        if (!cf.field || !cf.template) return;
                        var value = getZoteroFieldValue(data, cf.field);
                        if (value !== undefined && value !== '') {
                            var isArray = cf.field === 'tags' || cf.field === 'creators';
                            var rendered = renderField(value, cf.template, isArray);
                            if (rendered) customFieldsHtml += rendered;
                        }
                    });
                }

                if (customFieldsHtml) {
                    q.push('templatesHtml=' + encodeURIComponent(customFieldsHtml));
                }
            }

            if (linkPdf) q.push('lP=' + encodeURIComponent(linkPdf));
            if (linkWeb) q.push('lW=' + encodeURIComponent(linkWeb));
            if (linkCloudPdf) q.push('lC=' + encodeURIComponent(linkCloudPdf));
            return 'mnzotero://createNote?' + q.join('&');
        }

        function buildDownloadPdfUrl(uid, attachmentKey, title, apiKey, requestId) {
            var q = [
                'uid=' + encodeURIComponent(uid || ''),
                'attachmentKey=' + encodeURIComponent(attachmentKey || ''),
                'fileName=' + encodeURIComponent(title || T('Untitled')),
                'requestId=' + encodeURIComponent(requestId || '')
            ];
            if (apiKey) q.push('key=' + encodeURIComponent(apiKey));
            return 'mnzotero://downloadPdf?' + q.join('&');
        }

        function buildDownloadPdfIcon() {
            return '<svg class="pdf-download-icon" viewBox="0 0 100 100" aria-hidden="true"><g class="pdf-rotor"><rect width="100" height="100" rx="8" fill="#E53935"></rect><text x="50%" y="52%" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">PDF</text><circle class="pdf-plus-badge" cx="80" cy="80" r="12" fill="white"></circle><path class="pdf-plus-mark" d="M75 80 H85 M80 75 V85" stroke="#E53935" stroke-width="3" stroke-linecap="round"></path></g></svg>';
        }

        var __mnDownloadPending = {};
        var __mnSeq = 0;

        function createMNRequestId() {
            __mnSeq += 1;
            return 'mn_dl_' + Date.now() + '_' + __mnSeq;
        }

        function sendMNProtocol(url) {
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);
            setTimeout(function () { try { iframe.remove(); } catch (e) { } }, 600);
        }

        function startDownloadButtonMotion(btn) {
            var rotor = btn.querySelector('.pdf-rotor');
            if (!rotor) return null;
            var plusMark = btn.querySelector('.pdf-plus-mark');
            btn.classList.remove('is-finishing', 'is-success', 'is-failed');
            btn.classList.add('is-downloading');
            if (plusMark) plusMark.style.opacity = '0';
            rotor.style.animation = 'none';
            rotor.offsetHeight;
            rotor.style.animation = 'mn-download-spin 0.9s linear infinite';
            return { rotor: rotor };
        }

        function finishDownloadButtonMotion(btn, state, ok) {
            if (!btn) return;
            btn.classList.add('is-finishing');
            if (ok) btn.classList.add('is-success');
            else btn.classList.add('is-failed');
            setTimeout(function () {
                var rotor = state && state.rotor ? state.rotor : btn.querySelector('.pdf-rotor');
                var plusMark = btn.querySelector('.pdf-plus-mark');
                if (rotor) {
                    rotor.style.animation = 'none';
                    rotor.style.transform = 'rotate(0deg)';
                }
                if (plusMark) plusMark.style.opacity = '';
                btn.classList.remove('is-downloading', 'is-finishing', 'is-success', 'is-failed');
            }, 350);
        }

        function findDownloadButton(node) {
            var current = node;
            while (current && current !== document) {
                if (current.classList && current.classList.contains('download-pdf-btn')) return current;
                current = current.parentNode;
            }
            return null;
        }

        window.onMNDownloadResult = function (requestId, ok, errorMsg) {
            var entry = __mnDownloadPending[requestId];
            if (!entry) return;
            delete __mnDownloadPending[requestId];
            finishDownloadButtonMotion(entry.button, entry.motion, !!ok);
        };

        document.addEventListener('click', function (event) {
            var btn = findDownloadButton(event.target);
            if (!btn) return;
            event.preventDefault();
            if (btn.classList.contains('is-downloading')) return;

            var uid = btn.getAttribute('data-uid') || '';
            var attachmentKey = btn.getAttribute('data-attachment-key') || '';
            var fileName = btn.getAttribute('data-file-name') || 'Untitled';
            var apiKey = btn.getAttribute('data-api-key') || '';
            if (!uid || !attachmentKey) return;

            var requestId = createMNRequestId();
            var motion = startDownloadButtonMotion(btn);
            __mnDownloadPending[requestId] = { button: btn, motion: motion };
            setTimeout(function () {
                var stale = __mnDownloadPending[requestId];
                if (!stale) return;
                delete __mnDownloadPending[requestId];
                finishDownloadButtonMotion(stale.button, stale.motion, false);
            }, 45000);
            var protocolUrl = buildDownloadPdfUrl(uid, attachmentKey, fileName, apiKey, requestId);
            sendMNProtocol(protocolUrl);
        }, false);

        async function run() {
            const q = $('q').value.trim();
            
            // 从注入的配置或 DOM 中读取配置
            var cfg = window.__mnConfig || {};
            let mode = $('mode') ? $('mode').value : (cfg.mode || 'L');
            let uid = $('uid') ? $('uid').value : (cfg.uid || '');
            let slug = $('slug') ? $('slug').value : (cfg.slug || '');
            let key = $('key') ? $('key').value : (cfg.key || '');
            
            if (mode === 'L') uid = '0';

            const ui = { btn: $('btn'), log: $('log'), out: $('out') };

            ui.btn.disabled = true;
            ui.out.innerHTML = '';
            ui.log.style.display = 'block';
            ui.log.innerText = T('searching');

            var headers = { 'Zotero-API-Version': 3 };
            if (mode === 'C' && key) headers['Zotero-API-Key'] = key;
            const base = `${API[mode]}/${uid}`;
            const doFetch = mode === 'L' ? localFetch : function (url, opts) { return fetch(url, opts); };

            var colSelect = $('filter-collection');
            var tagSelect = $('filter-tag');
            var collectionKey = (colSelect && colSelect.value ? colSelect.value : '').trim();
            var selectedTags = tagSelect && tagSelect.selectedOptions ? Array.from(tagSelect.selectedOptions).map(function (o) { return o.value; }) : [];
            var path = collectionKey ? base + '/collections/' + collectionKey + '/items' : base + '/items';
            var params = ['limit=100'];
            if (q) params.push('q=' + encodeURIComponent(q));
            for (var ti = 0; ti < selectedTags.length; ti++) { params.push('tag=' + selectedTags[ti]); }
            var queryString = params.length ? ('?' + params.join('&')) : '';
            var url = path + queryString;

            try {
                var r1 = await doFetch(url, { headers: headers });
                if (!r1.ok) throw new Error(T('connection_failed'));

                const items = (await r1.json()).filter(i => !['attachment', 'note'].includes(i.data.itemType));

                if (!items.length) { ui.log.innerText = T('no_matches_found'); return; }
                ui.log.innerText = `Fetching attachments for ${items.length} items...`;

                var cards;
                if (mode === 'L') {
                    cards = [];
                    for (var i = 0; i < items.length; i++) {
                        var d = items[i].data;
                        var pdf = null;
                        try {
                            var r2 = await doFetch(base + '/items/' + d.key + '/children', { headers: headers });
                            if (r2.ok) {
                                var kids = await r2.json();
                                var p = kids.find(function (k) { return k.data.itemType === 'attachment' && (k.data.contentType === 'application/pdf' || (k.data.filename || '').endsWith('.pdf')); });
                                if (p) pdf = p.data.key;
                            }
                        } catch (e) { }
                        var lItem = 'zotero://select/library/items/' + d.key;
                        var btns = '<a href="' + lItem + '" class="pill pill-zotero">' + T('open_in_zotero') + '</a>';
                        if (pdf) {
                            var lPdf = 'zotero://open-pdf/library/items/' + pdf;
                            btns += '<a href="' + lPdf + '" class="pill pill-pdf">' + T('local_pdf') + '</a>';
                        }
                        var addTitle = (d.title || T('Untitled')).replace(/"/g, '"');
                        var year = (d.date || '').substring(0, 4) || '';
                        var author = (d.creators && d.creators[0] && (d.creators[0].lastName || d.creators[0].name)) || T('unknown');
                        var fieldTemplates = getFieldTemplates();
                        var createNoteUrl = buildCreateNoteUrl(d.title || T('Untitled'), d.itemType, year, author, lItem, pdf ? ('zotero://open-pdf/library/items/' + pdf) : '', '', '', d.key, mode, uid, key, d, fieldTemplates);
                        cards.push('<div class="list-item"><div class="list-item-body"><div class="list-title">' + addTitle + '</div><div class="meta-row"><span>' + author + '</span><span>' + (d.date || '') + '</span><span class="item-type-tag">' + d.itemType + '</span></div><div class="action-row">' + btns + '</div></div><a href="' + createNoteUrl + '" class="add-to-mn-btn" title="' + T('add_to_mn') + '">+</a></div>');
                    }
                } else {
                    cards = await Promise.all(items.map(async function (item) {
                        var d = item.data;
                        var pdf = null;
                        try {
                            var r2 = await doFetch(base + '/items/' + d.key + '/children', { headers: headers });
                            if (r2.ok) {
                                var kids = await r2.json();
                                var p = kids.find(function (k) { return k.data.itemType === 'attachment' && (k.data.contentType === 'application/pdf' || (k.data.filename || '').endsWith('.pdf')); });
                                if (p) pdf = p.data.key;
                            }
                        } catch (e) { }
                        var u = slug || 'user';
                        var lItem = 'zotero://select/library/items/' + d.key;
                        var cItem = 'https://www.zotero.org/' + u + '/items/' + d.key;
                        var btns = '<a href="' + lItem + '" class="pill pill-zotero">' + T('open_in_zotero') + '</a><a href="' + cItem + '" target="_blank" class="pill pill-web">' + T('web') + '</a>';
                        if (pdf) {
                            var lPdf = 'zotero://open-pdf/library/items/' + pdf;
                            var cPdf = 'https://www.zotero.org/' + u + '/items/' + d.key + '/attachment/' + pdf + '/reader';
                            btns += '<a href="' + lPdf + '" class="pill pill-pdf">' + T('local_pdf') + '</a><a href="' + cPdf + '" target="_blank" class="pill pill-web">' + T('cloud_pdf') + '</a>';
                        }
                        var addTitle = (d.title || T('Untitled')).replace(/"/g, '"');
                        var year = (d.date || '').substring(0, 4) || '';
                        var author = (d.creators && d.creators[0] && (d.creators[0].lastName || d.creators[0].name)) || T('unknown');
                        var fieldTemplates = getFieldTemplates();
                        var createNoteUrl = buildCreateNoteUrl(d.title || T('Untitled'), d.itemType, year, author, lItem, pdf ? lPdf : '', cItem, pdf ? cPdf : '', d.key, mode, uid, key, d, fieldTemplates);
                        var actionButtons = '';
                        if (pdf) {
                            var safeTitle = (d.title || T('Untitled')).replace(/"/g, '"');
                            var safeKey = String(key || '').replace(/"/g, '"');
                            actionButtons += '<a href="#" class="add-to-mn-btn download-pdf-btn" title="' + T('download_pdf') + '" data-uid="' + uid + '" data-attachment-key="' + pdf + '" data-file-name="' + safeTitle + '" data-api-key="' + safeKey + '">' + buildDownloadPdfIcon() + '</a>';
                        }
                        actionButtons += '<a href="' + createNoteUrl + '" class="add-to-mn-btn" title="' + T('add_to_mn') + '">+</a>';
                        return '<div class="list-item"><div class="list-item-body"><div class="list-title">' + addTitle + '</div><div class="meta-row"><span>' + author + '</span><span>' + (d.date || '') + '</span><span class="item-type-tag">' + d.itemType + '</span></div><div class="action-row">' + btns + '</div></div><div class="list-item-actions">' + actionButtons + '</div></div>';
                    }));
                }

                ui.out.innerHTML = '<div class="list-container">' + cards.join('') + '</div>';
                ui.log.style.display = 'none';

            } catch (e) { ui.log.innerText = 'Error: ' + e.message; }
            finally { ui.btn.disabled = false; }
        }
    </script>
</body>

</html>
